<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystical Tarot Reading</title>
    <link rel="stylesheet" href="style.css">
    <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
</head>
  <body>
    <div class="stars"></div>
    <div class="container">
      <h1 class="title">Mystical Tarot Reading</h1>
      <p class="subtitle">Unveil the wisdom that awaits you</p>

      <div class="cards-container">
        <div class="card" data-card="0">
          <div class="card-inner">
            <div class="card-back">
              <div class="card-pattern"></div>
              <div class="card-symbol">✦</div>
            </div>
            <div class="card-front">
              <div class="card-message"></div>
              <a href="https://omnia-com.vercel.app" target="_blank" class="card-book-btn">Book Now</a>
            </div>
          </div>
        </div>

        <div class="card" data-card="1">
          <div class="card-inner">
            <div class="card-back">
              <div class="card-pattern"></div>
              <div class="card-symbol">✦</div>
            </div>
            <div class="card-front">
              <div class="card-message"></div>
              <a href="https://omnia-com.vercel.app" target="_blank" class="card-book-btn">Book Now</a>
            </div>
          </div>
        </div>

        <div class="card" data-card="2">
          <div class="card-inner">
            <div class="card-back">
              <div class="card-pattern"></div>
              <div class="card-symbol">✦</div>
            </div>
            <div class="card-front">
              <div class="card-message"></div>
              <a href="https://omnia-com.vercel.app" target="_blank" class="card-book-btn">Book Now</a>
            </div>
          </div>
        </div>

        <div class="card" data-card="3">
          <div class="card-inner">
            <div class="card-back">
              <div class="card-pattern"></div>
              <div class="card-symbol">✦</div>
            </div>
            <div class="card-front">
              <div class="card-message"></div>
              <a href="https://omnia-com.vercel.app" target="_blank" class="card-book-btn">Book Now</a>
            </div>
          </div>
        </div>

        <div class="card" data-card="4">
          <div class="card-inner">
            <div class="card-back">
              <div class="card-pattern"></div>
              <div class="card-symbol">✦</div>
            </div>
            <div class="card-front">
              <div class="card-message"></div>
              <a href="https://omnia-com.vercel.app" target="_blank" class="card-book-btn">Book Now</a>
            </div>
          </div>
        </div>
      </div>

      <button id="drawButton" class="draw-button">
        <span class="button-text">Pick a message</span>
        <span class="button-glow"></span>
      </button>

      <div class="instructions">Click the button to reveal your destiny</div>
      

    </div>

    <audio id="backgroundMusic" loop preload="auto">
      <source src="/music.mp3" type="audio/mpeg">
    </audio>
    <script src="main.js"></script>
  </body>
</html>
